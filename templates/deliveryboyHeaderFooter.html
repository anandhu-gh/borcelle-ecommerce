{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { margin:0; font-family: system-ui, sans-serif; background:#fef8f3; display: flex; flex-direction: column; min-height: 100vh; }
        .topbar { position:fixed; top:0; left:0; right:0; height:60px; background:#ea580c; color:#fff; display:flex; align-items:center; justify-content:space-between; padding:0 24px; z-index:1000; }
        .sidebar { position:fixed; top:60px; left:0; width:240px; height:100%; background:#ffffff; border-right:1px solid #ffedd5; padding:24px 16px; }
        .nav-title { font-size:11px; color:#9a3412; font-weight: 700; text-transform:uppercase; letter-spacing:1px; margin-bottom: 12px; }
        .nav-item { display:flex; align-items:center; gap:12px; padding:12px; border-radius:8px; text-decoration:none; color:#431407; font-weight:500; transition:0.2s; margin-bottom: 4px; }
        .nav-item:hover { background:#fff7ed; color:#ea580c; }
        .content { margin-left:240px; padding: 84px 24px 24px; flex-grow: 1; }
        .alert-box { background:#fff; border:1px solid #ffedd5; border-radius:12px; padding:12px 16px; margin-bottom:20px; color:#9a3412; font-size:14px; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>

<header class="topbar">
    <div class="fw-bold fs-5">🚚 Delivery Hub</div>
    <div class="small opacity-75">Real-Time Management</div>
</header>

<aside class="sidebar">
    <div class="nav-title">Navigation</div>
    <nav>
        <a class="nav-item" href="{% url 'deliveryhome' %}"><i class="bi bi-grid-fill"></i> Dashboard</a>
        <a class="nav-item" href="{% url 'deliveryorders' %}"><i class="bi bi-box-seam"></i> Orders</a>
        <a class="nav-item" href="{% url 'deliveryhistory' %}"><i class="bi bi-clock-history"></i> History</a>
        <a class="nav-item" href="{% url 'deleiveryprofile' %}"><i class="bi bi-person-vcard-fill"></i> Profile</a>
        <a class="nav-item text-danger mt-4" href="{% url 'logout' %}"><i class="bi bi-box-arrow-right"></i> Logout</a>
    </nav>
</aside>

<main class="content">
    <div class="alert-box">
        <i class="bi bi-lightning-charge-fill text-warning"></i>
        <span>Tracking systems and active task assignments are live.</span>
    </div>
    {% block content %}{% endblock %}
</main>

</body>
</html>
