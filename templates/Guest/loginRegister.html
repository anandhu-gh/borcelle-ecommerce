{% extends "guestHeaderFooter.html" %}
{% block content %}

<style>
:root { --p-green: #1b4332; --input-bg: #f8fafc; }
.auth-page { min-height: 85vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; background: url('https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?q=80&w=2000') center/cover; position: relative; font-family: system-ui, sans-serif; }
.auth-page::before { content: ''; position: absolute; inset: 0; background: rgba(27, 67, 50, 0.6); backdrop-filter: blur(4px); }
.auth-container { position: relative; z-index: 2; width: 100%; max-width: 460px; }
.auth-head { text-align: center; color: #fff; margin-bottom: 24px; }
.auth-head h1 { font-family: 'Playfair Display', serif; font-size: 2.2rem; margin-bottom: 6px; }

.auth-card { background: rgba(255, 255, 255, 0.98); border-radius: 16px; padding: 32px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); }
.auth-card input[type="radio"] { display: none; }
.auth-tabs { display: flex; border-bottom: 2px solid #e2e8f0; margin-bottom: 24px; }
.auth-tabs label { flex: 1; text-align: center; padding: 10px; cursor: pointer; font-weight: 600; color: #718096; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.2s; }

#tab-login:checked ~ .auth-tabs label[for="tab-login"],
#tab-signup:checked ~ .auth-tabs label[for="tab-signup"] { color: var(--p-green); border-bottom-color: var(--p-green); }

.auth-form { display: none; }
#tab-login:checked ~ #form-login, #tab-signup:checked ~ #form-signup { display: block; }

.group { margin-bottom: 14px; }
.group input, .group select, .group textarea { width: 100%; padding: 12px 14px; border-radius: 8px; border: 1px solid #cbd5e1; background: var(--input-bg); font-size: 13.5px; outline: none; transition: 0.2s; box-sizing: border-box; }
.group input:focus, .group select:focus, .group textarea:focus { border-color: var(--p-green); background: #fff; box-shadow: 0 0 0 3px rgba(27,67,50,0.08); }
.group textarea { resize: none; font-family: inherit; }

.auth-btn { width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--p-green); color: #fff; font-weight: 600; font-size: 15px; cursor: pointer; transition: 0.2s; margin-top: 6px; }
.auth-btn:hover { background: #0f2c20; transform: translateY(-1px); }
.s-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.span-2 { grid-column: span 2; }
</style>

<div class="auth-page">
  <div class="auth-container">
    <div class="auth-head">
      <h1>Welcome to Borcelle</h1>
      <p style="font-size:14px; opacity:0.9;">Sign in or create an account to discover premium furniture.</p>
    </div>

    <div class="auth-card">
      <input type="radio" id="tab-login" name="auth_toggle" checked>
      <input type="radio" id="tab-signup" name="auth_toggle">

      <div class="auth-tabs">
        <label for="tab-login">Login</label>
        <label for="tab-signup">Register</label>
      </div>

      <div id="form-login" class="auth-form">
        <form method="POST" action="{% url 'login_process' %}">{% csrf_token %}
          <div class="group"><input type="text" name="username" placeholder="Username" required></div>
          <div class="group"><input type="password" name="password" placeholder="Password" required></div>
          <button type="submit" class="auth-btn">Sign In</button>
        </form>
      </div>

      <div id="form-signup" class="auth-form">
        <form method="POST" action="{% url 'signup_process' %}">{% csrf_token %}
          <div class="s-grid">
            <div class="group"><input type="text" name="fullname" placeholder="Full Name" pattern="[A-Za-z\s\.]{2,50}" oninput="this.value = this.value.replace(/[^A-Za-z\s\.]/g, '')" required></div>
            <div class="group"><input type="tel" name="phone" placeholder="Phone Number" pattern="[0-9]{10}" inputmode="numeric" maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '')" required></div>
            <div class="group span-2"><input type="email" name="email" placeholder="Email Address" required></div>
            <div class="group span-2">
              <select name="district" required>
                <option disabled selected>Select District</option>
                {% for d in dist %}<option value="{{ d.district_id }}">{{ d.name }}</option>{% endfor %}
              </select>
            </div>
            <div class="group span-2"><input type="text" name="location" placeholder="Location Detail" minlength="3" required></div>
            <div class="group span-2"><textarea name="address" placeholder="Full Address" rows="2" minlength="10" required></textarea></div>
            <div class="group"><input type="text" name="pincode" placeholder="Pincode" pattern="[0-9]{6}" inputmode="numeric" maxlength="6" oninput="this.value = this.value.replace(/[^0-9]/g, '')" required></div>
            <div class="group"><input type="text" name="username" placeholder="Username" pattern="[A-Za-z0-9_]{4,20}" required></div>
            <div class="group span-2"><input type="password" name="password" placeholder="Password" pattern=".{3,6}" required></div>
          </div>
          <button type="submit" class="auth-btn">Create Account</button>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
