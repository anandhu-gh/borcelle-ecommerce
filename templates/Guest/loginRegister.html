{% extends "guestHeaderFooter.html" %}
{% block content %}

<style>
.auth-page {
  min-height: 85vh;
  display: flex; align-items: center; justify-content: center;
  padding: 60px 20px;
  background: url('https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?q=80&w=2000') center/cover no-repeat;
  position: relative;
}
.auth-page::before {
  content: ''; position: absolute; inset: 0;
  background: rgba(27, 67, 50, 0.6); backdrop-filter: blur(5px);
}
.auth-container {
  position: relative; z-index: 2; width: 100%; max-width: 480px;
}
.auth-header { text-align: center; color: #fff; margin-bottom: 30px; }
.auth-header h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; font-weight: 700; margin-bottom: 10px; }
.auth-header p { font-size: 1rem; opacity: 0.9; }

.auth-card {
  background: rgba(255, 255, 255, 0.95);
  border-radius: 20px; padding: 40px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.2);
}
/* CSS Toggle Logic */
.auth-card input[type="radio"] { display: none; }
.auth-tabs {
  display: flex; border-bottom: 2px solid #e2e8f0; margin-bottom: 30px;
}
.auth-tabs label {
  flex: 1; text-align: center; padding: 12px; cursor: pointer;
  font-weight: 600; color: #718096; transition: all 0.3s;
  border-bottom: 3px solid transparent; margin-bottom: -2px;
}
#tab-login:checked ~ .auth-tabs label[for="tab-login"],
#tab-signup:checked ~ .auth-tabs label[for="tab-signup"] {
  color: #1b4332; border-bottom-color: #1b4332;
}
.auth-form { display: none; animation: fadeIn 0.4s ease; }
#tab-login:checked ~ #form-login { display: block; }
#tab-signup:checked ~ #form-signup { display: block; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* Inputs */
.auth-input-group { margin-bottom: 16px; }
.auth-input-group input, .auth-input-group select {
  width: 100%; padding: 14px 16px; border-radius: 10px;
  border: 1px solid #cbd5e1; background: #f8fafc;
  font-family: 'Inter', sans-serif; font-size: 14px; outline: none; transition: 0.2s;
}
.auth-input-group input:focus, .auth-input-group select:focus {
  border-color: #1b4332; background: #fff; box-shadow: 0 0 0 4px rgba(27,67,50,0.1);
}
.auth-btn {
  width: 100%; padding: 14px; border: none; border-radius: 10px;
  background: #1b4332; color: #fff; font-weight: 600; font-size: 16px;
  cursor: pointer; transition: 0.3s; margin-top: 10px;
}
.auth-btn:hover { background: #0f2c20; transform: translateY(-2px); }

/* Grid for Signup */
.signup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.col-full { grid-column: span 2; margin-bottom: 0 !important; }
</style>

<div class="auth-page">
  <div class="auth-container">
    <div class="auth-header">
      <h1>Welcome to Borcelle</h1>
      <p>Sign in or create an account to discover premium furniture.</p>
    </div>

    <div class="auth-card">
      <input type="radio" id="tab-login" name="auth_toggle" checked>
      <input type="radio" id="tab-signup" name="auth_toggle">

      <div class="auth-tabs">
        <label for="tab-login">Login</label>
        <label for="tab-signup">Register</label>
      </div>

      <div id="form-login" class="auth-form">
        <form method="POST" action="{% url 'login_process' %}">
          {% csrf_token %}
          <div class="auth-input-group">
            <input type="text" name="username" placeholder="Username" required>
          </div>
          <div class="auth-input-group">
            <input type="password" name="password" placeholder="Password" required>
          </div>
          <button type="submit" class="auth-btn">Sign In</button>
        </form>
      </div>

      <div id="form-signup" class="auth-form">
        <form method="POST" action="{% url 'signup_process' %}">
          {% csrf_token %}
          <div class="signup-grid">

            <!-- Full Name (NO numbers allowed) -->
            <div class="auth-input-group">
              <input 
                type="text" 
                name="fullname" 
                placeholder="Full Name"
                pattern="[A-Za-z\s\.]{2,50}"
                title="Only letters, spaces and dots allowed"
                oninput="this.value = this.value.replace(/[^A-Za-z\s\.]/g, '')"
                required>
            </div>

            <!-- Phone (ONLY numbers, max 10 digits) -->
            <div class="auth-input-group">
              <input 
                type="tel" 
                name="phone" 
                placeholder="Phone Number"
                pattern="[0-9]{10}"
                inputmode="numeric"
                maxlength="10"
                title="Enter a valid 10-digit phone number"
                oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                required>
            </div>

            <!-- Email -->
            <div class="auth-input-group col-full">
              <input 
                type="email" 
                name="email" 
                placeholder="Email Address"
                required>
            </div>

            <!-- District -->
            <div class="auth-input-group col-full">
              <select name="district" required>
                <option disabled selected>Select District</option>
                {% for d in dist %}
                  <option value="{{ d.district_id }}">{{ d.name }}</option>
                {% endfor %}
              </select>
            </div>

            <!-- Location -->
            <div class="auth-input-group col-full">
              <input 
                type="text" 
                name="location" 
                placeholder="Location Detail"
                minlength="3"
                required>
            </div>

            <!-- Address -->
            <div class="auth-input-group col-full">
              <textarea 
                name="address" 
                placeholder="Full Address" 
                rows="2"
                minlength="10"
                style="width: 100%; border: 1px solid #cbd5e1; border-radius: 10px; padding: 14px 16px; background: #f8fafc; font-family: 'Inter', sans-serif; font-size: 14px; outline: none;"
                required></textarea>
            </div>

            <!-- Pincode (ONLY numbers, 6 digits) -->
            <div class="auth-input-group">
              <input 
                type="text" 
                name="pincode" 
                placeholder="Pincode"
                pattern="[0-9]{6}"
                inputmode="numeric"
                maxlength="6"
                title="Enter a valid 6-digit pincode"
                oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                required>
            </div>

            <!-- Username -->
            <div class="auth-input-group">
              <input 
                type="text" 
                name="username" 
                placeholder="Username"
                pattern="[A-Za-z0-9_]{4,20}"
                title="4-20 characters, letters, numbers, underscore only"
                required>
            </div>

            <!-- Password -->
            <div class="auth-input-group">
              <input 
                type="password" 
                name="password" 
                placeholder="Password"
                pattern=".{3,6}"
                title="Password must contain minimum 3 characters"
                required>
            </div>

          </div>

          <button type="submit" class="auth-btn">Create Account</button>
        </form>
      </div>
    </div>
  </div>
</div>



{% endblock %}
