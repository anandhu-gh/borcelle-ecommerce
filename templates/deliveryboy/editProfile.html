{% extends "deliveryboyHeaderFooter.html" %}
{% block content %}

<style>
.edit-card {
    background: #ffffff;
    border-radius: 24px;
    padding: 35px;
    border: 1px solid #e2e8f0;
    max-width: 850px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.01);
}

.top h2 {
    margin: 0;
    font-size: 24px;
    font-weight: 700;
    color: #0f172a;
    letter-spacing: -0.5px;
}

.top p {
    margin-top: 4px;
    color: #64748b;
    font-size: 14px;
}

.note {
    margin-top: 20px;
    background: #f8fafc;
    color: #475569;
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 500;
    border: 1px solid #e2e8f0;
    display: flex;
    align-items: center;
    gap: 8px;
}

.form-grid {
    margin-top: 28px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 20px;
}

.form-box {
    display: flex;
    flex-direction: column;
}

.form-box label {
    margin-bottom: 8px;
    font-size: 13px;
    font-weight: 600;
    color: #334155;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.form-box input,
.form-box textarea {
    border: 1px solid #cbd5e1;
    background: #ffffff;
    border-radius: 12px;
    padding: 12px 16px;
    outline: none;
    font-size: 14px;
    color: #0f172a;
    transition: all 0.2s ease;
}

.form-box textarea {
    resize: none;
    height: 100px;
}

.form-box input:focus,
.form-box textarea:focus {
    border-color: #0f172a;
    box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.06);
}

.btn-save {
    margin-top: 30px;
    border: none;
    background: #0f172a;
    color: #ffffff;
    padding: 14px 28px;
    border-radius: 12px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: background 0.2s ease;
}

.btn-save:hover {
    background: #1e293b;
}
</style>

<div class="edit-card">

    <div class="top">
        <h2>Edit Delivery Profile</h2>
        <p>Update your personal details and contact information</p>
    </div>

    <div class="note">
        <i class="bi bi-exclamation-circle text-secondary"></i>
        <span>Username must be unique. Password must be at least 3 characters long</span>
    </div>

    <form method="POST">
        {% csrf_token %}

        <div class="form-grid">
            <!-- NAME -->
            <div class="form-box">
                <label>Full Name</label>
                <input 
                    type="text"
                    name="name"
                    value="{{ deliveryboy.name }}"
                    required
                    pattern="[A-Za-z ]{3,50}"
                    title="Enter valid identity string"
                >
            </div>

            <!-- USERNAME -->
            <div class="form-box">
                <label>Username</label>
                <input 
                    type="text"
                    name="username"
                    value="{{ deliveryboy.username }}"
                    required
                    pattern="[A-Za-z0-9_]{4,20}"
                    title="Security aliases require 4 to 20 alpha-numeric characters"
                >
            </div>

            <!-- EMAIL -->
            <div class="form-box">
                <label>Email Address</label>
                <input 
                    type="email"
                    name="email"
                    value="{{ deliveryboy.email }}"
                    required
                >
            </div>

            <!-- PHONE -->
            <div class="form-box">
                <label>Contact Number</label>
                <input 
                    type="text"
                    name="phone"
                    value="{{ deliveryboy.phone }}"
                    required
                    pattern="[0-9]{10}"
                    title="Enter standard 10 digit communication sequence"
                >
            </div>

            <!-- ADDRESS -->
            <div class="form-box" style="grid-column: 1 / -1;">
                <label>Full Address</label>
                <textarea 
                    name="address"
                    required
                    minlength="5"
                >{{ deliveryboy.address }}</textarea>
            </div>

            <!-- NEW PASSWORD -->
            <div class="form-box">
                <label>Password</label>
                <input 
                    type="password"
                    name="new_password"
                    required
                    value="{{ deliveryboy.password }}"
                    pattern=".{3,6}"
                    title="Secret hashes require a complexity density of 3-6 items"
                >
            </div>
        </div>

        <button type="submit" class="btn-save">
            <i class="bi bi-check-circle-fill"></i> Save Changes
        </button>
        &nbsp;&nbsp;<a href="{% url 'deleiveryprofile' %}" style="all: unset; display: inline-block; padding: 12px 22px; font-family: sans-serif; font-size: 16px; font-weight: 600; color: #fff; background: #dc3545; border-radius: 10px; cursor: pointer; text-align: center;">Cancel</a>
    </form>

</div>

{% endblock %}
