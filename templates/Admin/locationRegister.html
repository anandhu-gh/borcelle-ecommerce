{% extends "adminHeader.html" %}
{% block content %}

<style>
    .wrap { width: 90%; margin: 20px auto; font-family: sans-serif; }
    .flex-container { display: flex; gap: 40px; }
    .box { flex: 1; border: 1px solid #ccc; padding: 20px; border-radius: 8px; background: #fff; }
    select, input { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #ccc; }
    button { width: 100%; padding: 10px; background: #111827; color: white; border: none; border-radius: 5px; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
</style>

<div class="wrap">
    <h2>Locations</h2>
    
    <div class="flex-container">
        <div class="box">
            <h3>Add Location</h3>
            <form method="POST" action="{% url 'addlocation' %}">
                {% csrf_token %}
                <select name="district" required>
                    <option value="" disabled selected>Choose District</option>
                    {% for d in districts %}
                        <option value="{{ d.district_id }}">{{ d.name }}</option>
                    {% endfor %}
                </select>
                <input type="text" name="location" placeholder="Location Name" required>
                <button type="submit">Save Location</button>
            </form>
        </div>

        <div class="box">
            <h3>Filter Directory</h3>
            <select id="district-filter">
                <option value="all">All Locations</option>
                {% for d in districts %}
                    <option value="{{ d.district_id }}">{{ d.name }}</option>
                {% endfor %}
            </select>

            <table>
                <thead>
                    <tr>
                        <th>SL No</th>
                        <th>Location Name</th>
                    </tr>
                </thead>
                <tbody id="locations-table">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
document.getElementById("district-filter").onchange = function() {
    let distId = this.value;

    fetch("{% url 'filter_locations' %}?district=" + distId)
        .then(response => response.json())
        .then(data => {
            let htmlRows = "";
            
            for (let i = 0; i < data.length; i++) {
                htmlRows += "<tr>";
                htmlRows += "<td>" + (i + 1) + "</td>";
                htmlRows += "<td>" + data[i].location + "</td>";
                htmlRows += "</tr>";
            }
            
            if(data.length === 0) {
                htmlRows = "<tr><td colspan='2' style='text-align:center; color:gray;'>No records found</td></tr>";
            }

            document.getElementById("locations-table").innerHTML = htmlRows;
        });
};

// Fire filtering load immediately upon layout load window rendering
window.onload = function() {
    document.getElementById("district-filter").onchange();
};
</script>

{% endblock %}
