{% extends "adminHeader.html" %}
{% load static %}
{% block content %}

<style>

.wrap{
    width:95%;
    margin:auto;
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.add{
    background:#111827;
    color:#fff;
    padding:10px 16px;
    border-radius:10px;
    text-decoration:none;
}

select{
    padding:10px;
    border-radius:10px;
    border:1px solid #ddd;
    margin-bottom:20px;
}

.card{
    background:#fff;
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:15px;
    border-bottom:1px solid #eee;
    text-align:left;
}

tr:hover{
    background:#f9fafb;
}

img{
    width:55px;
    height:55px;
    border-radius:10px;
    object-fit:cover;
}

.edit{
    color:#2563eb;
    margin-right:10px;
    text-decoration:none;
}

.delete{
    color:#dc2626;
    text-decoration:none;
}

</style>

<div class="wrap">

    <div class="top">

        <h2>Products</h2>

        <a href="{% url 'addproductform' %}" class="add">
            + Add
        </a>

    </div>

   <select id="category">

    <option value="all">All Categories</option>

    {% for c in categories %}
        <option value="{{ c.category_id }}">
            {{ c.category_name }}
        </option>
    {% endfor %}

</select>

<table>
    <thead>
        <tr>
            <th>Image</th>
            <th>Name</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Actions</th>
        </tr>
    </thead>

    <tbody id="product-container">

        <!--
            this is the normal list of products that loads
            when the page first opens (no ajax involved here,
            just plain django template loop)
        -->

        {% for p in product_details %}
        <tr>
            <td>
                {% if p.ProductImage %}
                    <img src="{{ p.ProductImage.url }}" width="50">
                {% endif %}
            </td>
            <td>{{ p.ProductName }}</td>
            <td>₹{{ p.ProductPrice }}</td>
            <td>{{ p.stock }}</td>
            <td>
                <!-- just a normal link, clicking it goes straight to the edit page -->
                <a href="{% url 'editproduct' p.ProductId %}" class="edit">Edit</a>

                <!-- just a normal link, clicking it goes straight to the delete view -->
                <a href="{% url 'deleteproduct' p.ProductId %}" class="delete">Delete</a>
            </td>
        </tr>
        {% endfor %}

    </tbody>
</table>
    </div>

</div>

<script src="{% static 'jquery-3.7.1.min.js' %}"></script>

<script>

// ---------------------------------------------------
// THIS IS THE ONLY AJAX PART OF THE PAGE.
// it runs when the admin picks a category from the dropdown.
// it asks the server for matching products, and updates the
// table without reloading the whole page.
// ---------------------------------------------------

document.getElementById("category").onchange = function(){

    // get whichever category was picked from the dropdown
    let category = this.value;

    // ask the server (filter_products view) for products in that category
    fetch("{% url 'filter_products' %}?category=" + category)

        .then(function(response){
            // turn the response we got back into normal javascript data
            return response.json();
        })

        .then(function(data){

            // we will build the new rows as one long string of html
            let rows = "";

            // go through every product the server sent back
            for(let i = 0; i < data.length; i++){

                // add a new table row for this product
                rows += "<tr>";

                rows += "<td><img src='" + data[i].image + "' width='50'></td>";
                rows += "<td>" + data[i].name + "</td>";
                rows += "<td>₹" + data[i].price + "</td>";
                rows += "<td>" + data[i].stock + "</td>";

                // NOTE: edit and delete links are left out here on purpose.
                // the filtered rows only show product info. if you want
                // edit/delete links here too, the filter_products view
                // would need to send back the product id as well.
                rows += "<td></td>";

                rows += "</tr>";
            }

            // replace the old rows with the new filtered rows
            document.getElementById("product-container").innerHTML = rows;

        });

};

</script>

{% endblock %}
