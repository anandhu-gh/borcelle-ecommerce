{% extends "adminHeader.html" %}
{% block content %}

<style>
.admin-form-page { animation: fadeIn 0.4s ease; max-width: 550px; margin: 40px auto; }
.back-link { display: inline-block; margin-bottom: 20px; font-size: 14px; font-weight: 500; color: #6b7280; text-decoration: none; transition: 0.2s; }
.back-link:hover { color: #1b4332; }

.admin-form-card {
  background: #ffffff; border-radius: 16px; padding: 32px;
  border: 1px solid #e5e7eb; box-shadow: 0 4px 20px rgba(0,0,0,0.03);
}

.admin-form-card h3 { font-weight: 700; color: #111827; font-size: 1.6rem; margin-bottom: 24px; text-align: center; }

.input-group { margin-bottom: 20px; }
.input-group label { display: block; font-weight: 600; color: #374151; font-size: 14px; margin-bottom: 8px; }
.input-group input[type="text"] {
  width: 100%; padding: 12px 16px; border-radius: 10px;
  border: 1px solid #d1d5db; background: #f9fafb; font-family: inherit; font-size: 14px;
  color: #111827; transition: all 0.2s; outline: none;
}
.input-group input:focus { border-color: #1b4332; background: #ffffff; box-shadow: 0 0 0 4px rgba(27,67,50,0.1); }

.file-input-wrapper {
  border: 2px dashed #d1d5db; border-radius: 10px; padding: 16px;
  text-align: center; background: #f9fafb; transition: 0.2s; cursor: pointer;
}
.file-input-wrapper:hover { border-color: #1b4332; background: #f0fdf4; }
.file-input-wrapper input[type="file"] { width: 100%; font-size: 13px; color: #6b7280; }

.btn-submit {
  width: 100%; padding: 14px; background: #111827; color: #ffffff;
  border: none; border-radius: 10px; font-weight: 600; font-size: 15px;
  cursor: pointer; transition: all 0.2s; margin-top: 10px;
}
.btn-submit:hover { background: #374151; transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>

<div class="admin-form-page">
  <a href="{% url 'adminhome' %}" class="back-link">← Return to Dashboard</a>

  <div class="admin-form-card">
    <h3>Create Category</h3>

    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}

      <div class="input-group">
        <label>Category Name</label>
        <input type="text" name="category_name" placeholder="e.g. Living Room, Outdoor..." required>
      </div>

      <div class="input-group">
        <label>Category Display Image</label>
        <div class="file-input-wrapper">
          <input type="file" name="category_image">
        </div>
      </div>

      <button type="submit" class="btn-submit">Add Category</button>
    </form>
  </div>
</div>

{% endblock %}
