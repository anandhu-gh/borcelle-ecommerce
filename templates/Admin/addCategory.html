{% extends "adminHeader.html" %}
{% block content %}
<style>
    .form-container { max-width: 500px; margin: 40px auto; background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 28px; }
    .form-container h3 { font-size: 20px; font-weight: 700; color: #0f172a; text-align: center; margin-bottom: 24px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 14px; font-weight: 600; color: #334155; margin-bottom: 6px; }
    .form-control { width: 100%; padding: 10px 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; background: #f8fafc; }
    .btn-submit { width: 100%; padding: 12px; background: #0f172a; color: #ffffff; border: none; border-radius: 8px; font-weight: 600; margin-top: 12px; transition: 0.2s; }
    .btn-submit:hover { background: #1e293b; }
</style>

<div class="form-container">
    <h3>Create Category</h3>
    <form method="POST" action="{% url 'addcategory' %}" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-group">
            <label>Category Title Name</label>
            <input type="text" name="name" class="form-control" placeholder="e.g. Living Room Furniture" required>
        </div>

        <div class="form-group">
            <label>Category Banner/Icon Media Image</label>
            <input type="file" name="image" class="form-control" accept="image/*" required>
        </div>

        <button type="submit" class="btn-submit">Create Structure Block</button>
    </form>
</div>
{% endblock %}
