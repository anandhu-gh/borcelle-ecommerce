{% extends 'adminHeader.html' %}
{% block content %}

<div class="card p-4 shadow-sm border-0" style="max-width:500px;">

    <h4 class="mb-4">
        Register Location
    </h4>

    <form method="POST" action="">

        {% csrf_token %}

        <div class="mb-3">

            <label class="form-label">
                Select District
            </label>

            <select name="district" class="form-select" required>

                <option value="">
                    Select District
                </option>

                {% for d in districts %}

                <option value="{{ d.district_id }}">

                    {{ d.name }}

                </option>

                {% endfor %}

            </select>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Enter Location
            </label>

            <input type="text"
                   name="location"
                   class="form-control"
                   placeholder="Enter location"
                   required>

        </div>

        <button type="submit"
                class="btn btn-success">

            Save Location

        </button>

    </form>

</div>

{% endblock %}
