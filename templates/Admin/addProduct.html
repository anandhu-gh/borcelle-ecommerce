{% extends "adminHeader.html" %}
{% block content %}
<style>
    .form-container { max-width: 650px; margin: 0 auto; background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 28px; }
    .form-container h2 { font-size: 22px; font-weight: 700; color: #0f172a; margin-bottom: 4px; }
    .form-container p { color: #64748b; font-size: 14px; margin-bottom: 24px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 14px; font-weight: 600; color: #334155; margin-bottom: 6px; }
    .form-control, select, textarea { width: 100%; padding: 10px 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; background: #f8fafc; }
    .form-control:focus, select:focus, textarea:focus { outline: none; border-color: #0f172a; background: #ffffff; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .btn-submit { width: 100%; padding: 12px; background: #0f172a; color: #ffffff; border: none; border-radius: 8px; font-weight: 600; margin-top: 12px; transition: 0.2s; }
    .btn-submit:hover { background: #1e293b; }
</style>

<div class="form-container">
    <h2>Add New Product</h2>
    <p>Fill out the details to list a new furniture item in the catalog.</p>
    
    <form method="POST" action="{% url 'addproduct' %}" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-group">
            <label>Product Title</label>
            <input type="text" name="name" class="form-control" placeholder="e.g., Luxury Velvet Sofa" required>
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea name="description" rows="4" placeholder="Provide a detailed description..." required></textarea>
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label>Price (₹)</label>
                <input type="number" step="0.01" name="price" class="form-control" placeholder="0.00" required>
            </div>
            <div class="form-group">
                <label>Stock Quantity</label>
                <input type="number" name="stock" class="form-control" placeholder="e.g. 50" required>
            </div>
        </div>

        <div class="form-group">
            <label>Category</label>
            <select name="category" required>
                <option value="" disabled selected>Select Category</option>
                {% for c in categories %}
                    <option value="{{ c.category_id }}">{{ c.category_name }}</option>
                {% empty %}
                    <option disabled>No categories available</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Product Image</label>
            <input type="file" name="image" class="form-control" accept="image/*" required>
        </div>

        <button type="submit" class="btn-submit">Publish Product</button>
    </form>
</div>
{% endblock %}
