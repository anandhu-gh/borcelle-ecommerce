<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borcelle Furniture</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --b-green: #1b4332; --nav-text: #64748b; }
        body { font-family: 'Inter', sans-serif; background: #fafafa; min-height: 100vh; display: flex; flex-direction: column; margin: 0; }
        
        /* Navbar Utilities */
        .g-nav { background: #ffffff; border-bottom: 1px solid #f1f5f9; padding: 14px 0; }
        .logo { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: var(--b-green); text-decoration: none; }
        .g-link { color: var(--nav-text) !important; font-weight: 500; margin: 0 10px; transition: color 0.2s; text-decoration: none; }
        .g-link:hover { color: var(--b-green) !important; }
        .btn-join { background: var(--b-green); color: #ffffff !important; border-radius: 8px; padding: 8px 18px; font-size: 14px; font-weight: 500; text-decoration: none; transition: background 0.2s; }
        .btn-join:hover { background: #112a20; }

        /* Public Footer Utilities */
        .g-foot { background: var(--b-green); color: #cbd5e1; padding: 40px 0 20px; text-align: center; margin-top: auto; }
        .f-logo { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; color: #ffffff; margin-bottom: 12px; }
        .f-link { color: #cbd5e1; text-decoration: none; font-size: 14px; margin: 0 10px; transition: color 0.2s; }
        .f-link:hover { color: #ffffff; }
        .f-social { width: 34px; height: 34px; border-radius: 50%; background: rgba(255,255,255,0.08); display: inline-flex; align-items: center; justify-content: center; color: #ffffff; text-decoration: none; margin: 0 4px; transition: background 0.2s; }
        .f-social:hover { background: rgba(255,255,255,0.2); color: #ffffff; }
    </style>
</head>
<body>

<!-- PUBLIC GUEST NAVBAR -->
<nav class="navbar navbar-expand-md g-nav sticky-top">
    <div class="container">
        <a class="logo" href="{% url 'home' %}">Borcelle</a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#publicMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="publicMenu">
            <div class="navbar-nav mx-auto">
                <a class="g-link" href="{% url 'home' %}">Home</a>
                <a class="g-link" href="{% url 'guestproducts' %}">Explore Shop</a>
                <a class="g-link" href="{% url 'about' %}">About Us</a>
            </div>
            <a href="{% url 'login' %}" class="btn-join">Login / Register</a>
        </div>
    </div>
</nav>

<!-- MAIN APP DISPATCHER -->
<main style="flex: 1;">
    {% block content %}{% endblock %}
</main>

<!-- STATIC FOOTER NODE -->
<footer class="g-foot">
    <div class="container">
        <div class="f-logo">Borcelle</div>
        <div class="mb-3">
            <a class="f-link" href="{% url 'home' %}">Home</a>
            <a class="f-link" href="{% url 'guestproducts' %}">Shop</a>
            <a class="f-link" href="{% url 'about' %}">About Us</a>
            <a class="f-link" href="{% url 'termsandpolicy' %}">Terms</a>
        </div>
        <div class="mb-4">
            <a class="f-social" href="tel:+919876543210"><i class="bi bi-telephone-fill"></i></a>
            <a class="f-social" href="#"><i class="bi bi-instagram"></i></a>
            <a class="f-social" href="#"><i class="bi bi-facebook"></i></a>
            <a class="f-social" href="#"><i class="bi bi-twitter-x"></i></a>
        </div>
        <div class="small opacity-50 border-top border-secondary pt-3" style="max-width: 320px; margin: 0 auto;">
            &copy; 2026 Borcelle Furniture Inc.<br>Crafting Comfort for Modern Living.
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
