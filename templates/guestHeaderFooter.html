<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borcelle Furniture</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700;1,900&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        :root {
            --brand-dark: #1b4332;
            --brand-light: #d8f3dc;
            --text-main: #2d3748;
            --bg-main: #fcfcfc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
        }

        /* --- NAVBAR --- */
        .guest-navbar {
            background: #ffffff;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding: 16px 0;
            transition: all 0.3s;
        }

        .guest-navbar .nav-link { 
            color: var(--text-main); 
            font-weight: 500; 
            margin: 0 10px; 
            transition: color 0.3s; 
        }

        .guest-navbar .nav-link:hover { 
            color: var(--brand-dark); 
        }

        .btn-auth {
            background: var(--brand-dark); 
            color: #fff;
            border-radius: 50px; 
            padding: 10px 28px;
            font-weight: 500; 
            text-decoration: none;
            transition: all 0.3s;
            border: none;
        }

        .btn-auth:hover { 
            background: #0f2c20; 
            box-shadow: 0 4px 12px rgba(27,67,50,0.2); 
            color: #fff;
        }

        .guest-main { 
            flex: 1; 
        }

        /* --- FOOTER --- */
        .guest-footer {
            background: var(--brand-dark);
            color: rgba(255,255,255,0.8);
            padding: 60px 0 30px;
            text-align: center;
            margin-top: auto;
        }

        .guest-footer-brand { 
            font-family: 'Playfair Display', serif; 
            font-size: 32px; 
            color: #fff; 
            margin-bottom: 20px; 
            letter-spacing: 1px;
        }

        .guest-footer-links { 
            list-style: none; 
            padding: 0; 
            margin: 0 0 35px; 
            display: flex; 
            justify-content: center; 
            gap: 30px; 
            flex-wrap: wrap; 
        }

        .guest-footer-links a { 
            color: rgba(255,255,255,0.7); 
            text-decoration: none; 
            font-size: 14px; 
            transition: color 0.2s; 
            font-weight: 400;
        }

        .guest-footer-links a:hover { 
            color: #fff; 
        }

        /* Social Icons Fix */
        .guest-socials { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            margin-bottom: 35px; 
        }

        .guest-socials a {
            width: 42px; 
            height: 42px; 
            border-radius: 50%;
            background: rgba(255,255,255,0.1); 
            display: flex; 
            align-items: center; 
            justify-content: center;
            transition: all 0.3s ease;
            color: #ffffff; /* White icon color */
            text-decoration: none;
            font-size: 18px;
        }

        .guest-socials a:hover { 
            background: #ffffff; 
            color: var(--brand-dark); 
            transform: translateY(-4px);
        }

        .guest-copyright { 
            font-size: 13px; 
            color: rgba(255,255,255,0.4); 
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 25px;
            max-width: 300px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg guest-navbar sticky-top">
  <div class="container">
   <a class="navbar-brand" href="{% url 'home' %}" style="text-decoration: none; padding: 0;">
  <div style="display: flex; align-items: baseline; position: relative;">
    
    <span style="
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 900;
      font-size: 58px;
      color: #1b4332;
      line-height: 1;
      margin-right: -2px;
    ">B</span>

    <span style="
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 18px;
      color: #1b4332;
      text-transform: uppercase;
      letter-spacing: -0.5px;
      /* This move it up to align with the top of the B */
      transform: translateY(-18px); 
      border-bottom: 2px solid #1b4332;
      padding-bottom: 2px;
    ">orcelle</span>

  </div>
</a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#guestNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="guestNav">
      <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'guestproducts' %}">Explore Shop</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'about' %}">About Us</a></li>
      </ul>
      <div class="d-flex align-items-center">
        <a href="{% url 'login' %}" class="btn-auth">Login / Register</a>
      </div>
    </div>
  </div>
</nav>

<main class="guest-main">
  {% block content %}{% endblock %}
</main>

<footer class="guest-footer">
  <div class="container">
    <div class="guest-footer-brand">Borcelle</div>
    
    <ul class="guest-footer-links">
      <li><a href="{% url 'home' %}">Home</a></li>
      <li><a href="{% url 'guestproducts' %}">Shop</a></li>
      <li><a href="{% url 'about' %}">About Us</a></li>
      <li><a href="{% url 'termsandpolicy' %}">Terms of Service</a></li>
    </ul>
    
    <div class="guest-socials">
      <a href="tel:+919876543210" aria-label="Telephone"><i class="bi bi-telephone-fill"></i></a>
      <a href="#" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
      <a href="#" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
      <a href="#" aria-label="Twitter"><i class="fab fa-x-twitter"></i></a>
    </div>

    <div class="guest-copyright">
        © 2026 Borcelle Furniture Inc.<br>
        Crafting Comfort for Modern Living.
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
