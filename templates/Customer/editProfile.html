{% extends "customerHeader.html" %}
{% block content %}

<style>
.profile-container {
    max-width: 750px;
    margin: 40px auto;
    padding: 20px;
}

/* HEADER */
.profile-header {
    background: #e4e4e4;
    border-radius: 10px;
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 20px;
    border: 1px solid #eee;
}

.profile-header img {
    width: 70px;
    height: 70px;
    border-radius: 50%;
}

.profile-header h2 {
    margin: 0;
    font-size: 20px;
    color: #222;
}

/* GRID */
.profile-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

/* CARD */
.card {
    background: #fafafa;
    border-radius: 8px;
    padding: 14px;
    border: 1px solid #eee;
}

/* LABEL */
.label {
    font-size: 12px;
    color: #666;
    margin-bottom: 5px;
}

/* INPUT */
.value input,
.value select {
    width: 100%;
    padding: 8px;
    border-radius: 5px;
    border: 1px solid #ccc;
    font-size: 14px;
}

/* INPUT FOCUS */
.value input:focus,
.value select:focus {
    outline: none;
    border-color: #1b4332;
}

/* BUTTONS */
.actions {
    margin-top: 20px;
    display: flex;
    gap: 10px;
}

.btn {
    padding: 9px 16px;
    border-radius: 5px;
    font-size: 13px;
    border: 1px solid #ccc;
    background: #fff;
    cursor: pointer;
}

.btn-primary {
    background: #1b4332;
    color: #fff;
    border: none;
}

.btn-primary:hover {
    background: #0f2c20;
}

@media(max-width:768px){
    .profile-grid {
        grid-template-columns: 1fr;
    }
}
</style>

<div class="profile-container">

    <div class="profile-header">
        <img src="https://static.vecteezy.com/system/resources/thumbnails/005/544/718/small/profile-icon-design-free-vector.jpg">
        <h2>Edit Profile</h2>
    </div>

    <form method="POST">
        {% csrf_token %}

        <div class="profile-grid">

            <div class="card">
                <div class="label">Username</div>
                <div class="value">
                    <input type="text" name="username" value="{{ customer_details.username }}">
                </div>
            </div>

            <div class="card">
                <div class="label">Email</div>
                <div class="value">
                    <input type="email" name="email" value="{{ customer_details.email }}">
                </div>
            </div>

            <div class="card">
                <div class="label">Phone</div>
                <div class="value">
                    <input type="text" name="phone" value="{{ customer_details.phone }}">
                </div>
            </div>

            <div class="card">
                <div class="label">District</div>
                <div class="value">
                    <select name="district">
    {% for d in districts %}
    <option value="{{ d.district_id }}"
        {% if customer_details.district and d.district_id == customer_details.district.district_id %}
            selected
        {% endif %}>
        {{ d.name }}
    </option>
    {% endfor %}
</select>
                </div>
            </div>

            <div class="card">
                <div class="label">Location</div>
                <div class="value">
                    <input type="text" name="location" value="{{ customer_details.location }}">
                </div>
            </div>

            <div class="card">
                <div class="label">Address</div>
                <div class="value">
                    <input type="text" name="address" value="{{ customer_details.address }}">
                </div>
            </div>

            <div class="card">
                <div class="label">Pincode</div>
                <div class="value">
                    <input type="text" name="pincode" value="{{ customer_details.pincode }}">
                </div>
            </div>

            <div class="card">
                <div class="label">Password</div>
                <div class="value">
                    <input type="password" name="password" placeholder="New password">
                </div>
            </div>

        </div>

        <div class="actions">
            <button type="submit" class="btn-primary btn">Save Changes</button>
            <a href="{% url 'profile' %}" class="btn">Cancel</a>
        </div>

    </form>

</div>

{% endblock %}
