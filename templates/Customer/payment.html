{% extends "customerHeader.html" %}
{% block content %}

<div class="pay-wrap">

    <h2>Payment</h2>

    <!-- ONLY IMPORTANT DATA -->
    <div class="pay-box">
        <h3>Total Amount</h3>
        <h1>₹{{ total }}</h1>
    </div>

    <!-- PAYMENT FORM -->
    <form method="POST" action="{% url 'confirmpayment' %}" class="pay-box">
        {% csrf_token %}

        <label>Payment Method</label>
<select name="method" required>
    <option value="">Select Payment Method</option>
    <option value="Credit Card">Credit Card</option>
    <option value="Debit Card">Debit Card</option>
</select>

<label>Card Number</label>
<input
    type="text"
    name="card_number"
    required
    maxlength="16"
    minlength="16"
    pattern="[0-9]{16}"
    title="Enter a valid 16-digit card number">

<label>Expiry</label>
<input
    type="text"
    name="expiry"
    required
    placeholder="MM/YY"
    pattern="(0[1-9]|1[0-2])\/([0-9]{2})"
    title="Format: MM/YY">

<label>CVV</label>
<input
    type="password"
    name="cvv"
    required
    maxlength="3"
    minlength="3"
    pattern="[0-9]{3}"
    title="Enter a valid 3-digit CVV">

<button type="submit">Confirm Purchase</button>
    </form>

</div>

<style>
.pay-wrap {
    max-width: 400px;
    margin: 60px auto;
    text-align: center;
    font-family: Arial;
}

.pay-box {
    border: 1px solid #ddd;
    padding: 20px;
    margin-bottom: 20px;
}

h1 {
    color: #1b4332;
    margin: 10px 0;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
}

button {
    width: 100%;
    padding: 12px;
    background: #1b4332;
    color: white;
    border: none;
    cursor: pointer;
}
</style>

{% endblock %}
