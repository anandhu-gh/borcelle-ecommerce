{% extends "customerHeader.html" %}
{% block content %}

<div class="pay-wrap">

    <h2>Payment</h2>

    <!-- ONLY IMPORTANT DATA -->
    <div class="pay-box">
        <h3>Total Amount</h3>
        <h1>₹{{ total }}</h1>
    </div>

    <!-- PAYMENT FORM -->
    <form method="POST" action="{% url 'confirmpayment' %}" class="pay-box">
        {% csrf_token %}

        <label>Payment Method</label>
        <select name="method">
            <option>Credit Card</option>
            <option>Debit Card</option>
        </select>

        <label>Card Number</label>
        <input type="number" name="card_number" required>

        <label>Expiry</label>
        <input type="text" placeholder="MM/YY">

        <label>CVV</label>
        <input type="password">

        <button type="submit">Confirm Purchase</button>
    </form>

</div>

<style>
.pay-wrap {
    max-width: 400px;
    margin: 60px auto;
    text-align: center;
    font-family: Arial;
}

.pay-box {
    border: 1px solid #ddd;
    padding: 20px;
    margin-bottom: 20px;
}

h1 {
    color: #1b4332;
    margin: 10px 0;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
}

button {
    width: 100%;
    padding: 12px;
    background: #1b4332;
    color: white;
    border: none;
    cursor: pointer;
}
</style>

{% endblock %}
