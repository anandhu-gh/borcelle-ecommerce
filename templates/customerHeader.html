<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borcelle | Customer Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #1e293b; display: flex; flex-direction: column; min-height: 100vh; margin: 0; }
        .store-navbar { background: #ffffff; border-bottom: 1px solid #e2e8f0; padding: 14px 0; }
        .brand-logo { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; color: #1b4332; text-decoration: none; }
        .nav-link { color: #475569 !important; font-weight: 500; padding: 6px 12px; transition: 0.2s; }
        .nav-link:hover { color: #1b4332 !important; }
        .search-input { border-radius: 20px 0 0 20px; border: 1px solid #cbd5e1; background: #f1f5f9; }
        .search-btn { border-radius: 0 20px 20px 0; background: #1b4332; color: #fff; border: none; padding: 0 16px; }
        .user-badge img { width: 35px; height: 35px; border-radius: 50%; border: 1px solid #cbd5e1; }
        .store-footer { background: #ffffff; border-top: 1px solid #e2e8f0; padding: 40px 0 20px; text-align: center; margin-top: auto; }
        .footer-logo { font-family: 'Playfair Display', serif; font-size: 28px; color: #1b4332; margin-bottom: 16px; font-weight: 700; }
        .social-links a { width: 36px; height: 36px; border-radius: 50%; background: #f1f5f9; display: inline-flex; align-items: center; justify-content: center; color: #1b4332; text-decoration: none; margin: 0 6px; transition: 0.2s; }
        .social-links a:hover { background: #1b4332; color: #fff; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg store-navbar sticky-top">
    <div class="container">
        <a class="brand-logo" href="{% url 'customerhome' %}">Borcelle</a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#storeNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="storeNav">
            <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="{% url 'customerhome' %}">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'productsview' %}">Shop Collection</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'allcategories' %}">Categories</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'orderhistory' %}">My Orders</a></li>
            </ul>
            <form class="d-flex me-3" role="search">
                <input class="form-control search-input shadow-none" type="search" placeholder="Search furniture...">
                <button type="submit" class="search-btn">Search</button>
            </form>
            <a href="{% url 'cart' %}" class="me-3 fs-5 text-success"><i class="fa fa-shopping-cart"></i></a>
            <div class="dropdown">
                <a href="#" class="user-badge" id="userDropdown" data-bs-toggle="dropdown"><img src="https://cdn-icons-png.flaticon.com/512/848/848006.png" alt="User"></a>
                <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2">
                    <li><a class="dropdown-item py-2 text-muted" href="{% url 'profile' %}">My Profile</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item py-2 text-danger fw-bold" href="{% url 'logout' %}">Sign Out</a></li>
                </ul>
            </div>
        </div>
    </div>
</nav>

<main style="flex: 1;">
    <div class="container py-4">
        {% block content %}{% endblock %}
    </div>
</main>

<footer class="store-footer">
    <div class="container">
        <div class="footer-logo">Borcelle</div>
        <ul class="list-inline mb-3">
            <li class="list-inline-item mx-2"><a href="{% url 'customerhome' %}" class="text-secondary text-decoration-none small">Home</a></li>
            <li class="list-inline-item mx-2"><a href="{% url 'productsview' %}" class="text-secondary text-decoration-none small">Collections</a></li>
            <li class="list-inline-item mx-2"><a href="{% url 'customerabtpage' %}" class="text-secondary text-decoration-none small">About Us</a></li>
            <li class="list-inline-item mx-2"><a href="{% url 'custtermsandpolicy' %}" class="text-secondary text-decoration-none small">Terms</a></li>
        </ul>
        <div class="social-links mb-3">
            <a href="tel:+919876543210"><i class="bi bi-telephone-fill"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-x-twitter"></i></a>
        </div>
        <div class="text-muted small">&copy; 2026 Borcelle Furniture. Crafted with elegance.</div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
