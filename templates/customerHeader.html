<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borcelle | Customer Portal</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
  :root {
    --brand-dark: #1b4332;
    --brand-light: #d8f3dc;
    --brand-accent: #74c69d;
    --text-main: #2d3748;
    --text-muted: #718096;
    --bg-main: #f8fafc;
  }

  body {
    font-family: 'Inter', sans-serif;
    background-color: var(--bg-main);
    color: var(--text-main);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    margin: 0;
  }

  /* NAVBAR */
  .store-navbar {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(0,0,0,0.05);
    padding: 12px 0;
  }

  .store-navbar .nav-link {
    color: var(--text-main);
    font-weight: 500;
    padding: 8px 16px;
    transition: color 0.2s;
  }

  .store-navbar .nav-link:hover{ color: var(--brand-accent); }

  /* SEARCH */
  .store-search input {
    border-radius: 50px 0 0 50px;
    border: 1px solid #e2e8f0;
    background: #f1f5f9;
    padding-left: 20px;
  }

  .store-search button {
    border-radius: 0 50px 50px 0;
    background: var(--brand-dark);
    color: #fff;
    border: none;
    padding: 0 20px;
  }

  /* USER DROPDOWN FIXES */
  .dropdown-toggle::after {
    display: none !important; /* Removes the downward arrow */
  }

  .user-badge {
    background: #fff; border: 1px solid #e2e8f0;
    padding: 4px 12px 4px 4px; border-radius: 50px;
    display: flex; align-items: center; gap: 10px;
    transition: all 0.2s;
  }

  .user-badge img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }

  /* FOOTER */
  .store-footer {
    background: #ffffff;
    border-top: 1px solid #e2e8f0;
    padding: 60px 0 30px;
    text-align: center;
    margin-top: auto;
  }

  .store-socials { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }

  .store-socials a {
    width: 40px; height: 40px; border-radius: 50%;
    background: #f8fafc; display: flex; align-items: center; justify-content: center;
    transition: all 0.3s; border: 1px solid #e2e8f0;
    color: var(--brand-dark);
    text-decoration: none;
  }

  .store-socials a:hover { 
    background: var(--brand-dark); 
    color: #fff; 
    transform: translateY(-3px); 
  }
  .guest-footer-brand { 
            font-family: 'Playfair Display', serif; 
            font-size: 32px; 
            color: #5c9d16; 
            margin-bottom: 20px; 
            letter-spacing: 1px;
}
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg store-navbar sticky-top">
  <div class="container">
    <a class="navbar-brand" href="{% url 'customerhome' %}" style="text-decoration: none; padding: 0; min-width: 140px;">
      <div style="display: flex; align-items: baseline; position: relative; overflow: visible;">
        <span style="
          font-family: 'Playfair Display', serif;
          font-style: italic;
          font-weight: 900;
          font-size: 58px;
          color: #1b4332;
          line-height: 0.8;
          margin-right: 0px;
          display: inline-block;
        ">B</span>

        <span style="
          font-family: 'Inter', sans-serif;
          font-weight: 700;
          font-size: 18px;
          color: #1b4332;
          text-transform: uppercase;
          letter-spacing: -0.5px;
          transform: translateY(-16px); 
          border-bottom: 2px solid #1b4332;
          padding-bottom: 2px;
          display: inline-block;
        ">orcelle</span>
      </div>
    </a>

    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#storeNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="storeNav">
      <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="{% url 'customerhome' %}">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'productsview' %}">Shop Collection</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'allcategories' %}">Categories</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'orderhistory' %}">My Orders</a></li>
      </ul>

      <form class="d-flex store-search me-3" role="search">
        <input class="form-control shadow-none" type="search" placeholder="Search furniture...">
        <button type="submit" class="btn">Search</button>
      </form>

      <div class="cart-icon" style="width: 50px; padding: 5px; align-items: center;">
      <a href="{% url 'cart' %}" style="
  display:inline-flex;
  font-size:20px;
  color:#57a246;
  text-decoration:none;
">
  <i class="fa fa-shopping-cart"></i>
</a>
      </div>
      

      <div class="dropdown">
        <a href="#" class="text-decoration-none dropdown-toggle" id="userDropdown" data-bs-toggle="dropdown">
          <div class="user-badge">
            <img src="https://static.vecteezy.com/system/resources/thumbnails/005/544/718/small/profile-icon-design-free-vector.jpg" alt="User">
            <div class="user-info d-none d-md-block">
              <strong class="text-muted d-block" style="font-size: 13px; line-height: 1;">Welcome</strong>
            </div>
          </div>
        </a>
        <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0 mt-3" style="border-radius: 12px; min-width: 200px;">
          <li><a class="dropdown-item py-2 text-muted" href="{% url 'profile' %}">My Profile</a></li>
          <li><hr class="dropdown-divider"></li>
          <li><a class="dropdown-item py-2 text-danger fw-bold" href="{% url 'logout' %}">Sign Out</a></li>
        </ul>
      </div>
    </div>
  </div>
</nav>

<main style="flex: 1;">
  <div class="container py-4">
    {% block content %}{% endblock %}
  </div>
</main>

<footer class="store-footer">
  <div class="container">
    <div class="guest-footer-brand">Borcelle</div>

    <ul class="list-inline mb-4">
      <li class="list-inline-item mx-3"><a href="{% url 'customerhome' %}" class="text-muted text-decoration-none">Home</a></li>
      <li class="list-inline-item mx-3"><a href="{% url 'productsview' %}" class="text-muted text-decoration-none">Collections</a></li>
      <li class="list-inline-item mx-3"><a href="{% url 'customerabtpage' %}" class="text-muted text-decoration-none">About Us</a></li>
      <li class="list-inline-item mx-3"><a href="{% url 'custtermsandpolicy' %}" class="text-muted text-decoration-none">Terms of Service</a></li>
    </ul>

    <div class="store-socials">
      <a href="tel:+919876543210" aria-label="Telephone"><i class="bi bi-telephone-fill"></i></a>
      <a href="#" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
      <a href="#" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
      <a href="#" aria-label="Twitter"><i class="fab fa-x-twitter"></i></a>
    </div>

    <div style="font-size: 13px; color: #a0aec0;">© 2026 Borcelle Furniture. Crafted with elegance.</div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
