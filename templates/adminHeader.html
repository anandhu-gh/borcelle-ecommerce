<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Borcelle Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f8fafc; font-family: system-ui, sans-serif; display: flex; min-height: 100vh; margin: 0; }
        .sidebar { width: 260px; background: #ffffff; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; padding: 24px 16px; position: fixed; height: 100vh; }
        .profile { text-align: center; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #e2e8f0; }
        .profile img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; }
        .sidebar-menu { display: flex; flex-direction: column; gap: 4px; flex-grow: 1; }
        .sidebar a { display: flex; align-items: center; gap: 12px; padding: 10px 14px; color: #475569; text-decoration: none; border-radius: 8px; font-weight: 500; font-size: 14px; transition: 0.2s; }
        .sidebar a:hover { background: #f1f5f9; color: #0f172a; }
        .main { margin-left: 260px; display: flex; flex-direction: column; width: calc(100% - 260px); min-height: 100vh; }
        .topbar { background: #ffffff; height: 70px; border-bottom: 1px solid #e2e8f0; padding: 0 32px; display: flex; justify-content: space-between; align-items: center; }
        .content { padding: 32px; flex-grow: 1; }
        .footer { background: #ffffff; border-top: 1px solid #e2e8f0; text-align: center; padding: 16px; color: #64748b; font-size: 13px; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="profile">
        <img src="https://cdn-icons-png.flaticon.com/512/3781/3781986.png" alt="Admin">
        <h6 class="mt-2 mb-0 text-dark fw-bold">Administrator</h6>
        <small class="text-muted">Main Controller</small>
    </div>
    
    <nav class="sidebar-menu">
        <a href="{% url 'adminhome' %}"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a href="{% url 'adminproducts' %}"><i class="bi bi-box-seam"></i> Manage Inventory</a>
        <a href="{% url 'addproductform' %}"><i class="bi bi-plus-circle"></i> Add Product</a>
        <a href="{% url 'addcategory' %}"><i class="bi bi-grid"></i> Add Categories</a>
        <a href="{% url 'adddeliveryboy' %}"><i class="bi bi-truck"></i> Add Delivery Person</a>
    </nav>

    <a href="{% url 'logout' %}" class="btn btn-outline-danger w-100 mt-auto"><i class="bi bi-box-arrow-right me-2"></i>Logout</a>
</aside>

<div class="main">
    <header class="topbar">
        <a class="fw-bold text-dark text-decoration-none d-flex align-items-center gap-2 fs-5" href="{% url 'adminhome' %}">
            <img src="https://marketplace.canva.com/EAGFyCMc17Q/2/0/1600w/canva-dark-green-modern-icons-home-furnishing-logo-fAa79wXM5QY.jpg" width="32" class="rounded">
            Borcelle Admin
        </a>
        <div class="d-flex align-items-center gap-4">
            <a href="{% url 'home' %}" class="text-secondary text-decoration-none small fw-medium"><i class="bi bi-globe me-1"></i> Live Store</a>
            <a href="{% url 'adminorders' %}" class="text-secondary text-decoration-none small fw-medium"><i class="bi bi-box-seam me-1"></i> Orders</a>
            <i class="bi bi-bell fs-5 text-secondary cursor-pointer"></i>
        </div>
    </header>

    <main class="content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <strong>Borcelle Furniture ERP</strong> &copy; 2026 Internal Management Portal
    </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
